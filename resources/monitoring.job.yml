resources:
  jobs:
    monitoring:
      name: "Monitoring & Smoke Tests"
      queue:
        enabled: true
      parameters:
        - name: "catalog_name"
          default: "${var.catalog_name}"
        - name: "schema_name"
          default: "${resources.schemas.corporate_schema.name}"
        - name: "experiment_name"
          default: "${resources.experiments.experiment.name}"
        - name: "app_name"
          default: "${var.app_name}"
        - name: "llm_endpoint"
          default: "${var.llm_endpoint}"
        - name: "vector_search_endpoint"
          default: "${var.vector_search_endpoint}"
      tasks:
        - task_key: smoke_tests
          notebook_task:
            notebook_path: ../notebooks/05_inference_testing.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              experiment_name: "{{job.parameters.experiment_name}}"
              app_name: "{{job.parameters.app_name}}"
              llm_endpoint: "{{job.parameters.llm_endpoint}}"
              vector_search_endpoint: "{{job.parameters.vector_search_endpoint}}"
        - task_key: monitoring_dashboard
          depends_on:
            - task_key: smoke_tests
          notebook_task:
            notebook_path: ../notebooks/06_monitoring_dashboard.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              experiment_name: "{{job.parameters.experiment_name}}"
              app_name: "{{job.parameters.app_name}}"
      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"
        timezone_id: "America/Los_Angeles"
      tags:
        Project: "${bundle.name}"
