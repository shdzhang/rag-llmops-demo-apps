resources:
  jobs:
    deploy_agent:
      name: "Deploy Agent (App)"
      queue:
        enabled: true
      parameters:
        - name: "catalog_name"
          default: "${var.catalog_name}"
        - name: "schema_name"
          default: "${resources.schemas.corporate_schema.name}"
        - name: "model_name"
          default: "${var.model_name}"
        - name: "experiment_name"
          default: "${resources.experiments.experiment.name}"
        - name: "app_name"
          default: "${var.app_name}"
      tasks:
        - task_key: model_registration
          notebook_task:
            notebook_path: ../notebooks/06_model_registration.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              model_name: "{{job.parameters.model_name}}"
              experiment_name: "{{job.parameters.experiment_name}}"
        - task_key: deploy
          depends_on:
            - task_key: model_registration
          notebook_task:
            notebook_path: ../notebooks/07_app_deployment.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              model_name: "{{job.parameters.model_name}}"
              experiment_name: "{{job.parameters.experiment_name}}"
              app_name: "{{job.parameters.app_name}}"
        - task_key: inference_testing
          depends_on:
            - task_key: deploy
          notebook_task:
            notebook_path: ../notebooks/08_inference_testing.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              model_name: "{{job.parameters.model_name}}"
              experiment_name: "{{job.parameters.experiment_name}}"
              app_name: "{{job.parameters.app_name}}"
      tags:
        Project: "${bundle.name}"
