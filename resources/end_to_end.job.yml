resources:
  jobs:
    end_to_end:
      name: "End-to-End LLMOps Pipeline (Apps)"
      queue:
        enabled: true
      tasks:
        # ── Stage 1: Data Preparation ──
        - task_key: data_preparation
          run_job_task:
            job_id: ${resources.jobs.data_preparation.id}

        # ── Stage 2: Build & Evaluate ──
        - task_key: build_evaluate
          depends_on:
            - task_key: data_preparation
          run_job_task:
            job_id: ${resources.jobs.build_evaluate.id}

        # ── Stage 3: Deploy App ──
        - task_key: deploy_agent
          depends_on:
            - task_key: build_evaluate
          run_job_task:
            job_id: ${resources.jobs.deploy_agent.id}

        # ── Stage 4: Monitor ──
        - task_key: monitoring
          depends_on:
            - task_key: deploy_agent
          run_job_task:
            job_id: ${resources.jobs.monitoring.id}
      tags:
        Project: "${bundle.name}"
