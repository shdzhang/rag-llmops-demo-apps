resources:
  jobs:
    data_preparation:
      name: "Data Preparation"
      queue:
        enabled: true
      parameters:
        - name: "catalog_name"
          default: "${var.catalog_name}"
        - name: "schema_name"
          default: "${resources.schemas.corporate_schema.name}"
        - name: "vector_search_endpoint"
          default: "${var.vector_search_endpoint}"
        - name: "embedding_endpoint"
          default: "${var.embedding_endpoint}"
      tasks:
        - task_key: data_ingestion
          notebook_task:
            notebook_path: ../notebooks/01_data_ingestion.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
        - task_key: vector_index
          depends_on:
            - task_key: data_ingestion
          notebook_task:
            notebook_path: ../notebooks/02_vector_index_creation.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              vector_search_endpoint: "{{job.parameters.vector_search_endpoint}}"
              embedding_endpoint: "{{job.parameters.embedding_endpoint}}"
      tags:
        Project: "${bundle.name}"
